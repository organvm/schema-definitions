name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install jsonschema pyyaml pytest ruff pyright rfc8785==0.1.4
      - name: Lint with ruff
        run: ruff check scripts/ tests/
      - name: Type check with pyright
        run: pyright scripts/
      - run: pytest tests/ -v
      - run: python scripts/validate.py --all-examples
